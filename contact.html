<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact & Support | uRhythm</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="oneui-header-container">
        <h1 class="oneui-main-title">Contact Us</h1>
    </header>

    <div class="glass-panel">
        <p style="margin-top: 0; color: var(--text-muted);">Have questions, feedback, or found a bug? Let us know how we can improve your experience.</p>
        
        <form id="contactForm" action="https://formsubmit.co/c133e40e14339e711bb386f7bed75d5c" method="POST">
            <input type="hidden" name="_next" value="https://urhythm.vercel.app">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_subject" value="New Submission: urhythm Support">

            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>
            </div>

            <div class="form-group">
                <label for="type">Inquiry Type</label>
                <select id="type" name="type" required>
                    <option value="feedback">General Feedback</option>
                    <option value="report">Report a Bug/Issue</option>
                    <option value="question">Question/Support</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="4" placeholder="your words please" style="width: 100%; padding: 14px 18px; border: 1px solid var(--border-color); border-radius: 18px; background-color: var(--input-bg); color: var(--text-color); font-family: var(--body-font); font-size: 1rem; box-sizing: border-box;" required></textarea>
            </div>

            <button type="submit" class="primary w-full">Send Message</button>
        </form>
    </div>

    <div class="glass-panel" style="padding: 20px;">
        <h3 style="margin-top: 0; font-size: 1.1rem;">Direct Links</h3>
        <p style="font-size: 0.9rem; color: var(--text-muted);">
            Email: <a href="mailto:maakasamindian@gmail.com" style="color: var(--accent-color);">maakasamindian@gmail.com</a><br>
            Website: <a href="https://ujjwalravi.vercel.app" target="_blank" style="color: var(--accent-color);">uagalaxy.netlify.app/uasocial</a>
        </p>
    </div>

    <footer>
        <p>&copy; 2026 uRhythm. <a href="index.html">Back to Home</a></p>
    </footer>

    <script>
        const dark =localStorage.getItem('theme') !== 'dark'
        document.body.setAttribute('data-theme', 'dark');
    </script>
</body>
</html>
